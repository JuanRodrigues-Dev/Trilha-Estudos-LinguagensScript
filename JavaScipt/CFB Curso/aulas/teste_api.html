<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste da API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #764ba2;
    }
    #resultado {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 Teste da API</h1>
    <button onclick="chamarAPI()">Gerar Número Aleatório</button>
    <div id="resultado"></div>
  </div>

  <script>
    async function chamarAPI() {
      try {
        const resposta = await fetch('http://localhost:8080');
        const dados = await resposta.json();
        document.getElementById('resultado').innerHTML = `
          <p>Número gerado: <strong>${dados.valor}</strong></p>
        `;
      } catch (erro) {
        document.getElementById('resultado').innerHTML = `
          <p style="color: red;">Erro ao conectar: ${erro.message}</p>
        `;
      }
    }
  </script>
</body>
</html>
